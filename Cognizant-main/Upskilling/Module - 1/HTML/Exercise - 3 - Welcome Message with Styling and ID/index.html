<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 5px;
        }
    </style>

</head>

<body>

    <div id="welcomeBanner">
        <h1>Welcome to Community Event Portal</h1>
    </div>

    <br>

    <p>
        Register today and get a
        <span style="color:red; font-weight:bold;">
            Special Offer
        </span>
        on premium events.
    </p>

    <p class="highlight">
        Early Bird Registration Available
    </p>

    <p class="highlight">
        Limited Seats Remaining
    </p>

    <p>
        Stay connected with your local community events.
    </p>

</body>

</html>
