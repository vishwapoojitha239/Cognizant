<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
        }

        .eventImage {
            width: 200px;
            height: 150px;
            border: 3px solid blue;
            border-radius: 8px;
        }

        .caption {
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <h1>Community Event Gallery</h1>

    <table>

        <tr>

            <td>
                <img src="images/event1.jpg"
                     alt="Tech Meetup"
                     title="Tech Meetup Event"
                     class="eventImage">

                <div class="caption">
                    Tech Meetup
                </div>
            </td>

            <td>
                <img src="images/event2.jpg"
                     alt="AI Workshop"
                     title="AI Workshop"
                     class="eventImage">

                <div class="caption">
                    AI Workshop
                </div>
            </td>

            <td>
                <img src="images/event3.jpg"
                     alt="Frontend Bootcamp"
                     title="Frontend Bootcamp"
                     class="eventImage">

                <div class="caption">
                    Frontend Bootcamp
                </div>
            </td>

        </tr>

        <tr>

            <td>
                <img src="images/event4.jpg"
                     alt="Sports Day"
                     title="Sports Day"
                     class="eventImage">

                <div class="caption">
                    Sports Day
                </div>
            </td>

            <td>
                <img src="images/event5.jpg"
                     alt="Music Festival"
                     title="Music Festival"
                     class="eventImage">

                <div class="caption">
                    Music Festival
                </div>
            </td>

            <td>
                <img src="images/event6.jpg"
                     alt="Food Carnival"
                     title="Food Carnival"
                     class="eventImage">

                <div class="caption">
                    Food Carnival
                </div>
            </td>

        </tr>

    </table>

</body>

</html>
