<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        form {
            width: 400px;
            padding: 20px;
            border: 2px solid #3498db;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }

        output {
            display: block;
            margin-top: 15px;
            color: green;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <h1>Community Event Registration</h1>

    <form onsubmit="showMessage(); return false;">

        <label for="name">Full Name</label>
        <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            required
            autofocus>

        <label for="email">Email</label>
        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required>

        <label for="date">Event Date</label>
        <input
            type="date"
            id="date"
            required>

        <label for="eventType">Event Type</label>
        <select id="eventType" required>
            <option value="">Select Event</option>
            <option>Tech Meetup</option>
            <option>AI Workshop</option>
            <option>Frontend Bootcamp</option>
            <option>Sports Day</option>
        </select>

        <label for="message">Message</label>
        <textarea
            id="message"
            rows="4"
            placeholder="Enter your message"></textarea>

        <button type="submit">
            Register
        </button>

        <output id="result"></output>

    </form>

    <script>
        function showMessage() {
            document.getElementById("result").innerHTML =
                "Registration Submitted Successfully!";
        }
    </script>

</body>

</html>
