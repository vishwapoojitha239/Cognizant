<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <title>Alignment & Reordering</title>

</head>

<body>

    <div class="container mt-5">

        <div class="row
                    justify-content-center
                    align-items-center"
             style="height:200px;">

            <div class="col-4 bg-primary text-white p-3">

                Centered Content

            </div>

        </div>

        <hr>

        <div class="row">

            <div class="col-md-6 order-md-2 bg-success text-white p-3">

                Column A

            </div>

            <div class="col-md-6 order-md-1 bg-warning p-3">

                Column B

            </div>

        </div>

    </div>

</body>

</html>
