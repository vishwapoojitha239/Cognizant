<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<title>Typography</title>

</head>

<body>

<div class="container mt-4">

    <h1 class="display-1">
        Community Portal
    </h1>

    <p class="lead">
        Welcome to Bootstrap Typography.
    </p>

    <p class="text-muted">
        This is muted text.
    </p>

    <p class="fw-bold">
        Bold Text Example
    </p>

    <hr>

    <p class="text-uppercase">
        uppercase text
    </p>

    <p class="text-lowercase">
        LOWERCASE TEXT
    </p>

    <p class="text-capitalize">
        bootstrap typography utilities
    </p>

</div>

</body>
</html>
