<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <title>Column Layouts</title>
</head>

<body>

    <div class="container mt-4">

        <div class="row">

            <div class="col-md-3 bg-secondary text-white p-3">

                Sidebar

            </div>

            <div class="col-md-9 bg-light p-3">

                Main Content Area

            </div>

        </div>

        <hr>

        <div class="row">

            <div class="col-sm-3 bg-primary text-white p-3">
                Col 1
            </div>

            <div class="col-sm-3 bg-success text-white p-3">
                Col 2
            </div>

            <div class="col-sm-3 bg-warning p-3">
                Col 3
            </div>

            <div class="col-sm-3 bg-danger text-white p-3">
                Col 4
            </div>

        </div>

    </div>

</body>

</html>
