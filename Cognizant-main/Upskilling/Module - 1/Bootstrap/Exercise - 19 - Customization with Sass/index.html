<!DOCTYPE html>

<div class="container mt-5">

<div class="alert alert-info">

<h3>Bootstrap Sass Setup</h3>

<p>

Exercise 19.1:
Install Bootstrap using npm.

</p>

<pre>
npm install bootstrap
npm install sass
</pre>

<p>

Exercise 19.2:
Modify _variables.scss

</p>

<pre>
$primary: #ff6600;
$border-radius: 1rem;
</pre>

<p>

Compile Sass:

</p>

<pre>
sass custom.scss custom.css
</pre>

</div>
