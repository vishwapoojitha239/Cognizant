<!DOCTYPE html>
<html>

<head>

    <title>jQuery Inclusion</title>

    <!-- CDN Version -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <p id="message">
        Hello World!

    <script>

        $(document).ready(function () {

            console.log(

        });

    </script>

</body>

</html>
