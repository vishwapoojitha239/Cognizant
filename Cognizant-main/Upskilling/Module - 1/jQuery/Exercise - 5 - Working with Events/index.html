<!DOCTYPE html>
<html>

<head>

<title>Events</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>

#colorBox {

    width: 200px;

    height: 200px;

    border: 2px solid black;

}

</style>

</head>

<body>

<button id="colorBtn">
Change Color
</button>

<div id="colorBox"></div>

<script>

$("#colorBtn").click(function () {

    $("#colorBox").css(
        "background",
        "red"
    );

});

$("#colorBtn").dblclick(function () {

    $("#colorBox").css(
        "background",
        "white"
    );

});

</script>

</body>

</html>
