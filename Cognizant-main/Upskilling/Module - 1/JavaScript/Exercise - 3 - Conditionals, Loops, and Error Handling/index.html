<!DOCTYPE html>
<html lang="en">

<head>
    <title>Operators Example</title>
</head>

<body>

    <h1>Event Fee Calculator</h1>

    <script>

        let ticketPrice = 500;

        let quantity = 2;

        let totalAmount =
            ticketPrice * quantity;

        console.log(
            "Total Fee: ₹" +
            totalAmount
        );

        console.log(
            ticketPrice > 100
        );

        console.log(
            quantity > 0 &&
            ticketPrice > 0
        );

    </script>

</body>

</html>
