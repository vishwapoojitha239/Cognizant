<!DOCTYPE html>
<html>

<head>
    <title>Functions Example</title>
</head>

<body>

    <h1>Event Fee Calculation</h1>

    <script>

        function calculateFee(
            ticketPrice,
            quantity
        ) {

            return ticketPrice * quantity;
        }

        let total =
            calculateFee(
                500,
                3
            );

        console.log(
            "Total Fee: ₹" +
            total
        );

    </script>

</body>

</html>
