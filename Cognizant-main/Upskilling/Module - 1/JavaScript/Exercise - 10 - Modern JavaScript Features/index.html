<!DOCTYPE html>
<html>

<head>
    <title>Event Handling</title>
</head>

<body>

    <h1>Community Event Portal</h1>

    <button onclick="showMessage()">
        Click Me
    </button>

    <p id="result"></p>

    <script>

        function showMessage() {

            document
                .getElementById("result")
                .innerHTML =
                "Button Clicked Successfully!";
        }

    </script>

</body>

</html>
