<!DOCTYPE html>
<html>

<head>
    <title>DOM Manipulation</title>
</head>

<body>

    <h1 id="title">
        Community Event Portal
    </h1>

    <button onclick="changeText()">
        Change Title
    </button>

    <script>

        function changeText() {

            document
                .getElementById("title")
                .innerHTML =
                "Welcome to JavaScript DOM!";
        }

    </script>

</body>

</html>
