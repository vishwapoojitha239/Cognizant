<!DOCTYPE html>
<html>

<head>
    <title>Arrays Example</title>
</head>

<body>

    <h1>Event Array</h1>

    <script>

        let events = [

            "Tech Meetup",

            "AI Workshop",

            "Sports Day"
        ];

        events.push(
            "Music Festival"
        );

        events.pop();

        console.log(events);

    </script>

</body>

</html>
